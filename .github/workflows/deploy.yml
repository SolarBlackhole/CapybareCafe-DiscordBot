name: Build and Push Bot

on:
  push:
    branches: [ "main", "test" ]

# This gives the script permission to write to your GitHub Packages
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # We manually construct the lowercase name here
          tags: |
            ghcr.io/solarblackhole/capybarecafe-discordbot:${{ github.ref_name == 'main' && 'latest' || 'test' }}
